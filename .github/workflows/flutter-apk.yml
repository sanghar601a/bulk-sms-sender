name: Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Bootstrap Clean Flutter Structure
        run: |
          # 1. Create a backup of our custom code and configurations
          mkdir -p temp_backup
          cp -r lib temp_backup/
          cp pubspec.yaml temp_backup/
          cp android/app/src/main/AndroidManifest.xml temp_backup/AndroidManifest.xml

          # 2. Delete the manually written android and ios directories to avoid conflicts
          rm -rf android ios

          # 3. Let Flutter CLI generate the official, standard build structure
          flutter create --org com.offlinesms.bulksms --project-name bulk_sms_sender --platforms=android,ios .

          # 4. Restore our custom code and permission settings
          cp -f temp_backup/pubspec.yaml pubspec.yaml
          rm -rf lib
          cp -r temp_backup/lib lib
          cp -f temp_backup/AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      - name: Install dependencies
        run: flutter pub get

      - name: Patch JCenter in Pub Cache Dependencies
        run: |
          # Replace jcenter() with mavenCentral() globally in all pub cache build.gradle scripts
          find ~/.pub-cache/ -name "build.gradle" -exec sed -i 's/jcenter()/mavenCentral()/g' {} +

      - name: Build APK
        run: |
          flutter build apk --release > build_log.txt 2>&1

      - name: Commit build log on failure
        if: failure()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add build_log.txt
          git commit -m "build failure log [skip ci]"
          git push

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
