name: Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Bootstrap Clean Flutter Structure
        run: |
          # 1. Create a backup of our custom code and configurations
          mkdir -p temp_backup
          cp -r lib temp_backup/
          cp pubspec.yaml temp_backup/
          cp android/app/src/main/AndroidManifest.xml temp_backup/AndroidManifest.xml

          # 2. Delete the manually written android and ios directories to avoid conflicts
          rm -rf android ios

          # 3. Let Flutter CLI generate the official, standard build structure
          flutter create --org com.offlinesms.bulksms --project-name bulk_sms_sender --platforms=android,ios .

          # 4. Restore our custom code and permission settings
          cp -f temp_backup/pubspec.yaml pubspec.yaml
          rm -rf lib
          cp -r temp_backup/lib lib
          cp -f temp_backup/AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      - name: Install dependencies
        run: flutter pub get

      - name: Patch Dependencies (Namespace & SDK versions)
        run: |
          # 1. Replace jcenter() with mavenCentral() globally in all pub cache build.gradle scripts
          find ~/.pub-cache/ -name "build.gradle" -exec sed -i 's/jcenter()/mavenCentral()/g' {} +

          # 2. Inject missing namespace declarations, force compileSdkVersion/targetSdkVersion to 33, and patch java Registrar files
          python3 -c "
          import os, re
          pub_cache = os.path.expanduser('~/.pub-cache/hosted/pub.dev/')
          for root, dirs, files in os.walk(pub_cache):
              # Patch Gradle files
              if 'build.gradle' in files:
                  gradle_path = os.path.join(root, 'build.gradle')
                  manifest_path = os.path.join(root, 'src/main/AndroidManifest.xml')
                  if os.path.exists(manifest_path):
                      with open(gradle_path, 'r', encoding='utf-8', errors='ignore') as f:
                          gradle_content = f.read()
                      
                      modified = False
                      
                      # Inject namespace if missing
                      if 'namespace' not in gradle_content and 'android {' in gradle_content:
                          with open(manifest_path, 'r', encoding='utf-8', errors='ignore') as f:
                              manifest_content = f.read()
                          match = re.search(r'package=\"([^\"]+)\"', manifest_content)
                          if match:
                              package_name = match.group(1)
                              gradle_content = gradle_content.replace('android {', f'android {{\n    namespace \"{package_name}\"')
                              modified = True
                              print(f'Successfully injected namespace \"{package_name}\" into {gradle_path}')
                      
                      # Force compileSdkVersion to 33
                      if 'compileSdkVersion' in gradle_content:
                          gradle_content = re.sub(r'compileSdkVersion\s+\S+', 'compileSdkVersion 33', gradle_content)
                          modified = True
                          print(f'Forced compileSdkVersion 33 in {gradle_path}')
                      
                      # Force targetSdkVersion to 33
                      if 'targetSdkVersion' in gradle_content:
                          gradle_content = re.sub(r'targetSdkVersion\s+\S+', 'targetSdkVersion 33', gradle_content)
                          modified = True
                          print(f'Forced targetSdkVersion 33 in {gradle_path}')
                      
                      if modified:
                          with open(gradle_path, 'w', encoding='utf-8') as f:
                              f.write(gradle_content)
              
              # Patch Java files to fix Registrar compilation issues
              for file in files:
                  if file.endswith('.java'):
                      java_path = os.path.join(root, file)
                      with open(java_path, 'r', encoding='utf-8', errors='ignore') as f:
                          content = f.read()
                      
                      java_modified = False
                      if 'Registrar' in content:
                          # Comment out import
                          new_content = re.sub(
                              r'import\s+io\.flutter\.plugin\.common\.PluginRegistry\.Registrar\s*;',
                              '// import io.flutter.plugin.common.PluginRegistry.Registrar;',
                              content
                          )
                          if new_content != content:
                              content = new_content
                              java_modified = True
                          
                          # Comment out registerWith method
                          match = re.search(r'public\s+static\s+void\s+registerWith\s*\(\s*(?:[a-zA-Z0-9._]+)?Registrar\s+\w+\s*\)\s*\{', content)
                          if match:
                              start_idx = match.start()
                              brace_count = 0
                              end_idx = -1
                              for i in range(start_idx, len(content)):
                                  if content[i] == '{':
                                      brace_count += 1
                                  elif content[i] == '}':
                                      brace_count -= 1
                                      if brace_count == 0:
                                          end_idx = i + 1
                                          break
                              if end_idx != -1:
                                  method_code = content[start_idx:end_idx]
                                  commented_method = '/*' + method_code + '*/'
                                  content = content[:start_idx] + commented_method + content[end_idx:]
                                  java_modified = True
                                  print(f'Successfully commented out registerWith in {java_path}')
                      
                      if java_modified:
                          with open(java_path, 'w', encoding='utf-8') as f:
                              f.write(content)
          "

      - name: Build APK
        run: |
          flutter build apk --release > build_log.txt 2>&1

      - name: Commit build log on failure
        if: failure()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add build_log.txt
          git commit -m "build failure log [skip ci]"
          git push

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
